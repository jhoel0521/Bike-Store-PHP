services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bike_store_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: Bike_Store
      DB_USER: bike_user
      DB_PASSWORD: bike_password
    develop:
      watch:
        - action: sync
          path: ./
          target: /var/www/html
          initial_sync: true
          ignore:
            - .git/
            - node_modules/
            - .vscode/
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: bike_store_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: Bike_Store
      MYSQL_USER: bike_user
      MYSQL_PASSWORD: bike_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
