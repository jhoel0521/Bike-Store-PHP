services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bike_store_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: Bike_Store
      DB_USER: bike_user
      DB_PASSWORD: bike_password
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: bike_store_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: Bike_Store
      MYSQL_USER: bike_user
      MYSQL_PASSWORD: bike_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./MysqlBikeStoreScript.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
